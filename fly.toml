# ============================================
# BitBit - Fly.io Configuration
# ============================================
# Deploys to Sydney region for APAC latency optimization
# Uses Firecracker MicroVMs for security isolation

app = "bitbit-cheekyglo"
primary_region = "syd"

# Graceful shutdown configuration
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  TZ = "Australia/Sydney"
  DATABASE_PATH = "/data/bitbit.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "bitbit_data"
  destination = "/data"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

# Note: Secrets (API keys) will be set via `fly secrets set`
