name: E2E

on:
  pull_request:
    branches: [main]
    paths:
      - 'personal-assistant/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:
    inputs:
      playwright_base_url:
        description: 'Override base URL for E2E (optional). If blank, uses secret or local dev server default.'
        required: false
        type: string

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    defaults:
      run:
        working-directory: personal-assistant

    env:
      CI: true
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.playwright_base_url || secrets.PLAYWRIGHT_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            personal-assistant/package-lock.json

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install app dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate E2E credentials
        run: |
          if [ -z "$E2E_USER_EMAIL" ] || [ -z "$E2E_USER_PASSWORD" ]; then
            echo "::error::Missing E2E_USER_EMAIL and/or E2E_USER_PASSWORD secrets."
            exit 1
          fi

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            personal-assistant/playwright-report/
            personal-assistant/test-results/
          if-no-files-found: warn
          retention-days: 14
