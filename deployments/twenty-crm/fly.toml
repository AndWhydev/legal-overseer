# ============================================
# BitBit CRM — Twenty Backend (Headless API)
# ============================================
# Self-hosted Twenty CRM as BitBit's CRM data engine
# Exposes GraphQL/REST API on port 3000
# Sydney region for APAC latency

app = "bitbit-crm"
primary_region = "syd"

kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_PORT = "3000"
  SERVER_URL = "https://bitbit-crm.fly.dev"
  STORAGE_TYPE = "local"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

[[vm]]
  size = "shared-cpu-2x"
  memory = "2048mb"

[mounts]
  source = "twenty_local_storage"
  destination = "/app/packages/twenty-server/.local-storage"

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/healthz"
    interval = "30s"
    timeout = "10s"
    grace_period = "300s"
