app = "bitbit-workers"
primary_region = "syd"

[build]
  dockerfile = "deployments/fly/Dockerfile"
  dockerfile_entrypoint = ""

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
  count = 2

[checks]
  [checks.health]
    port = 3000
    type = "http"
    interval = "30s"
    timeout = "5s"
    path = "/api/monitoring/health"
    method = "GET"

[metrics]
  port = 9091
  path = "/metrics"
