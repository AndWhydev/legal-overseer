name = "bitbit-edge-cron"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[triggers]
# Fire every 5 minutes to poll for pending agent work
crons = ["*/5 * * * *"]

[vars]
ENVIRONMENT = "production"

[limits]
cpu_ms = 10000

# Secrets configured via `wrangler secret put`:
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# WORKER_CALLBACK_URL
