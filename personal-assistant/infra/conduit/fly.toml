app = "bitbit-conduit"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  CONDUIT_CONFIG = "/etc/conduit/conduit.toml"
  # CONDUIT_REGISTRATION_TOKEN set via `fly secrets set` — not in code

[[services]]
  internal_port = 6167
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

[mounts]
  source = "conduit_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
