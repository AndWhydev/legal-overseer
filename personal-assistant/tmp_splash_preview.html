<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitBit — The Warm Boot</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0F1A;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
  }

  .scene {
    position: relative;
    width: 400px;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Gradient bloom ── */
  .bloom {
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,90,31,0.07) 0%, transparent 70%);
    animation: bloom-breathe 4s ease-in-out infinite;
  }
  @keyframes bloom-breathe {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50%      { transform: scale(1.18); opacity: 1; }
  }

  /* ── Heartbeat pulse rings ── */
  .pulse-ring {
    position: absolute;
    width: 72px;
    height: 72px;
    border-radius: 18px;
    border: 1.5px solid rgba(255,90,31,0.45);
    opacity: 0;
    animation: pulse-expand 3.5s ease-out infinite;
  }
  .pulse-ring:nth-child(2) { animation-delay: 1.2s; }
  .pulse-ring:nth-child(3) { animation-delay: 2.4s; }
  @keyframes pulse-expand {
    0%   { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(3.8); opacity: 0; }
  }

  /* ── Orbital dots ── */
  .orbit {
    position: absolute;
    width: 0;
    height: 0;
  }
  .orbit-dot {
    position: absolute;
    border-radius: 50%;
    background: #FF5A1F;
    box-shadow: 0 0 6px 2px rgba(255,90,31,0.5);
  }
  .orbit-a {
    animation: orbit-cw 8s linear infinite;
  }
  .orbit-a .orbit-dot {
    width: 3px;
    height: 3px;
    top: -54px;
    left: -1.5px;
  }
  .orbit-b {
    animation: orbit-ccw 12s linear infinite;
  }
  .orbit-b .orbit-dot {
    width: 2px;
    height: 2px;
    top: -70px;
    left: -1px;
  }
  @keyframes orbit-cw  { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
  @keyframes orbit-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

  /* ── Loading arc (SVG) ── */
  .loading-arc {
    position: absolute;
    width: 140px;
    height: 140px;
    animation: arc-spin 6s linear infinite;
  }
  .loading-arc circle {
    fill: none;
    stroke: rgba(255,90,31,0.25);
    stroke-width: 1;
    stroke-dasharray: 20% 80%;
    stroke-linecap: round;
  }
  @keyframes arc-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── Logo + text group (for entry sequence) ── */
  .logo-text-group {
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
    z-index: 2;
    animation: entry-spring 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes entry-spring {
    0%   { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* After entry, swoosh logo left + slide text in */
  .logo-text-group.settled {
    animation: settle 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* ── The BitBit Logo ── */
  .logo-container {
    position: relative;
    width: 72px;
    height: 72px;
    flex-shrink: 0;
    animation: logo-breathe 4s ease-in-out infinite;
    animation-delay: 1.35s;
  }
  @keyframes logo-breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }

  .logo-body {
    width: 72px;
    height: 72px;
    background: #FF5A1F;
    border-radius: 18px;
    position: relative;
    box-shadow: 0 0 30px rgba(255,90,31,0.3);
  }

  /* White inner window */
  .logo-window {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 30px;
    height: 30px;
    background: #F5F0E8;
    border-radius: 8px;
    box-shadow: 0 0 12px rgba(255,90,31,0.35);
    animation: window-glow 3s ease-in-out infinite;
  }
  @keyframes window-glow {
    0%, 100% { box-shadow: 0 0 12px rgba(255,90,31,0.35); }
    50%      { box-shadow: 0 0 22px rgba(255,90,31,0.55), 0 0 40px rgba(255,90,31,0.15); }
  }

  /* Curly stem */
  .logo-stem {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 18px;
  }
  .logo-stem svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .logo-stem path {
    fill: none;
    stroke: #FF5A1F;
    stroke-width: 2.5;
    stroke-linecap: round;
  }

  /* ── Text block ── */
  .text-block {
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transform: translateX(20px);
  }
  .text-block.visible {
    animation: text-slide-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes text-slide-in {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* BitBit title — each letter */
  .title {
    font-size: 28px;
    font-weight: 600;
    color: #F5F0E8;
    display: flex;
    line-height: 1;
  }
  .title .letter {
    display: inline-block;
    opacity: 0;
    filter: blur(8px);
    transform: translateY(8px);
  }
  .text-block.visible .letter {
    animation: letter-in 0.4s ease-out forwards;
  }
  .text-block.visible .letter:nth-child(1) { animation-delay: 0.00s; }
  .text-block.visible .letter:nth-child(2) { animation-delay: 0.05s; }
  .text-block.visible .letter:nth-child(3) { animation-delay: 0.10s; }
  .text-block.visible .letter:nth-child(4) { animation-delay: 0.15s; }
  .text-block.visible .letter:nth-child(5) { animation-delay: 0.20s; }
  .text-block.visible .letter:nth-child(6) { animation-delay: 0.25s; }
  @keyframes letter-in {
    from { opacity: 0; filter: blur(8px); transform: translateY(8px); }
    to   { opacity: 1; filter: blur(0);   transform: translateY(0); }
  }

  /* Subtitle */
  .subtitle {
    font-size: 11px;
    font-weight: 400;
    color: #FF5A1F;
    opacity: 0;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    line-height: 1;
  }
  .text-block.visible .subtitle {
    animation: sub-in 0.5s ease-out 0.35s forwards;
  }
  @keyframes sub-in {
    from { opacity: 0; }
    to   { opacity: 0.5; }
  }

  /* ── Rising embers ── */
  .embers {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .ember {
    position: absolute;
    border-radius: 50%;
    background: #FF5A1F;
    opacity: 0;
    animation: ember-rise linear infinite;
  }
  @keyframes ember-rise {
    0%   { opacity: 0; transform: translateY(0) translateX(0); }
    10%  { opacity: 0.7; }
    80%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-120px) translateX(var(--drift)); }
  }

  /* Individual ember styles */
  .ember:nth-child(1)  { width: 2px;   height: 2px;   left: 42%; bottom: 25%; --drift: -8px;  animation-duration: 3.2s; animation-delay: 0.0s; }
  .ember:nth-child(2)  { width: 3px;   height: 3px;   left: 55%; bottom: 22%; --drift: 12px;  animation-duration: 3.8s; animation-delay: 0.4s; }
  .ember:nth-child(3)  { width: 1.5px; height: 1.5px; left: 48%; bottom: 28%; --drift: -5px;  animation-duration: 4.0s; animation-delay: 0.8s; }
  .ember:nth-child(4)  { width: 2.5px; height: 2.5px; left: 38%; bottom: 24%; --drift: 15px;  animation-duration: 3.5s; animation-delay: 1.2s; }
  .ember:nth-child(5)  { width: 2px;   height: 2px;   left: 60%; bottom: 26%; --drift: -10px; animation-duration: 4.2s; animation-delay: 1.6s; }
  .ember:nth-child(6)  { width: 3.5px; height: 3.5px; left: 45%; bottom: 23%; --drift: 7px;   animation-duration: 3.0s; animation-delay: 2.0s; }
  .ember:nth-child(7)  { width: 1.5px; height: 1.5px; left: 53%; bottom: 27%; --drift: -14px; animation-duration: 4.5s; animation-delay: 0.3s; }
  .ember:nth-child(8)  { width: 2px;   height: 2px;   left: 35%; bottom: 25%; --drift: 9px;   animation-duration: 3.7s; animation-delay: 0.7s; }
  .ember:nth-child(9)  { width: 2.5px; height: 2.5px; left: 62%; bottom: 22%; --drift: -6px;  animation-duration: 3.3s; animation-delay: 1.1s; }
  .ember:nth-child(10) { width: 1.5px; height: 1.5px; left: 50%; bottom: 29%; --drift: 11px;  animation-duration: 4.1s; animation-delay: 1.5s; }
  .ember:nth-child(11) { width: 3px;   height: 3px;   left: 40%; bottom: 21%; --drift: -12px; animation-duration: 3.9s; animation-delay: 1.9s; }
  .ember:nth-child(12) { width: 2px;   height: 2px;   left: 57%; bottom: 26%; --drift: 8px;   animation-duration: 3.4s; animation-delay: 2.3s; }

  /* ── Entry sequence swoosh ── */
  .logo-container.swoosh-left {
    animation: swoosh-left 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes swoosh-left {
    /* logo-breathe will resume after this completes */
  }
</style>
</head>
<body>

<div class="scene">
  <!-- Gradient bloom -->
  <div class="bloom"></div>

  <!-- 3 heartbeat pulse rings -->
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>

  <!-- Orbital dots -->
  <div class="orbit orbit-a"><div class="orbit-dot"></div></div>
  <div class="orbit orbit-b"><div class="orbit-dot"></div></div>

  <!-- Loading arc -->
  <svg class="loading-arc" viewBox="0 0 140 140">
    <circle cx="70" cy="70" r="68" />
  </svg>

  <!-- Rising embers -->
  <div class="embers">
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
  </div>

  <!-- Logo + text group -->
  <div class="logo-text-group" id="logoTextGroup">
    <!-- The BitBit logo -->
    <div class="logo-container" id="logoContainer">
      <!-- Curly stem -->
      <div class="logo-stem">
        <svg viewBox="0 0 20 18">
          <path d="M10 18 C10 12, 6 10, 6 6 C6 2, 10 0, 13 2 C15 3.5, 14 5, 12 5 C10 5, 9.5 3.5, 10.5 2.5" />
        </svg>
      </div>
      <!-- Orange body -->
      <div class="logo-body">
        <!-- White window -->
        <div class="logo-window"></div>
      </div>
    </div>

    <!-- Text block -->
    <div class="text-block" id="textBlock">
      <div class="title">
        <span class="letter">B</span>
        <span class="letter">i</span>
        <span class="letter">t</span>
        <span class="letter">B</span>
        <span class="letter">i</span>
        <span class="letter">t</span>
      </div>
      <div class="subtitle">WARMING UP</div>
    </div>
  </div>
</div>

<script>
  // Entry sequence: logo springs in (CSS handles the 0.7s spring)
  // After 650ms wait, text slides in from the right
  setTimeout(() => {
    document.getElementById('textBlock').classList.add('visible');
  }, 700 + 650);
</script>

</body>
</html>
