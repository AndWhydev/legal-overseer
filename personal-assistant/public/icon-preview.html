<!DOCTYPE html>
<html>
<head>
  <title>BitBit macOS Icon Preview</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      margin: 0;
    }
    .dark-section { background: #1a1a2e; color: #e0e0e0; padding: 48px; width: 100%; box-sizing: border-box; }
    .light-section { background: #e8e8ee; color: #1a1a1a; padding: 48px; width: 100%; box-sizing: border-box; }
    .section-inner { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 32px; }
    h1 { font-size: 28px; font-weight: 600; margin: 0; }
    .row { display: flex; align-items: flex-end; gap: 32px; flex-wrap: wrap; justify-content: center; }
    .icon { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .icon span { font-size: 12px; opacity: 0.6; }
    h2 { font-size: 20px; font-weight: 500; opacity: 0.8; margin: 0; }
  </style>
</head>
<body>
  <div class="dark-section">
    <div class="section-inner">
      <h1>BitBit Icon — Dark Mode</h1>
      <div class="row">
        <div class="icon"><img src="bitbit-icon-1024.png" width="256" height="256" /><span>1024</span></div>
        <div class="icon"><img src="bitbit-icon-512.png" width="256" height="256" /><span>512</span></div>
        <div class="icon"><img src="bitbit-icon-256.png" width="256" height="256" /><span>256</span></div>
      </div>
      <div class="row">
        <div class="icon"><img src="bitbit-icon-128.png" width="128" height="128" /><span>128</span></div>
        <div class="icon"><img src="bitbit-icon-64.png" width="64" height="64" /><span>64</span></div>
        <div class="icon"><img src="bitbit-icon-32.png" width="32" height="32" /><span>32</span></div>
        <div class="icon"><img src="bitbit-icon-16.png" width="16" height="16" /><span>16</span></div>
      </div>
    </div>
  </div>

  <div class="light-section">
    <div class="section-inner">
      <h1>BitBit Icon — Light Mode</h1>
      <div class="row">
        <div class="icon"><img src="bitbit-icon-1024-light.png" width="256" height="256" /><span>1024</span></div>
        <div class="icon"><img src="bitbit-icon-512-light.png" width="256" height="256" /><span>512</span></div>
        <div class="icon"><img src="bitbit-icon-256-light.png" width="256" height="256" /><span>256</span></div>
      </div>
      <div class="row">
        <div class="icon"><img src="bitbit-icon-128-light.png" width="128" height="128" /><span>128</span></div>
        <div class="icon"><img src="bitbit-icon-64-light.png" width="64" height="64" /><span>64</span></div>
        <div class="icon"><img src="bitbit-icon-32-light.png" width="32" height="32" /><span>32</span></div>
        <div class="icon"><img src="bitbit-icon-16-light.png" width="16" height="16" /><span>16</span></div>
      </div>
    </div>
  </div>
</body>
</html>
