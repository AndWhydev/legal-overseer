<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- macOS squircle clip path -->
    <clipPath id="squircle">
      <path d="M512 0C224.3 0 112.2 0 56.1 56.1S0 224.3 0 512s0 399.8 56.1 455.9S224.3 1024 512 1024s399.8 0 455.9-56.1S1024 799.7 1024 512s0-399.8-56.1-455.9S799.7 0 512 0z"/>
    </clipPath>

    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2d4a"/>
      <stop offset="100%" stop-color="#0f1926"/>
    </linearGradient>

    <!-- Inner border gradient -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>

    <!-- Eye gradient (3D depth) -->
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </linearGradient>

    <!-- Brow gradient -->
    <linearGradient id="browGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>

    <!-- Nose gradient -->
    <linearGradient id="noseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>

    <!-- Mouth gradient -->
    <linearGradient id="mouthGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>

    <!-- Pupil gradient -->
    <linearGradient id="pupilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>

    <!-- Eye glow filter -->
    <filter id="eyeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for 3D elements -->
    <filter id="shadow3d" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Subtle inner shadow for background -->
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feOffset dx="0" dy="4"/>
      <feFlood flood-color="#2a4070" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>

    <!-- Scanline pattern for eyes -->
    <pattern id="scanlines" width="100%" height="8" patternUnits="userSpaceOnUse">
      <rect width="100%" height="4" fill="transparent"/>
      <rect y="4" width="100%" height="4" fill="rgba(0,0,0,0.08)"/>
    </pattern>
  </defs>

  <!-- Background squircle -->
  <g clip-path="url(#squircle)">
    <!-- Base fill -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle radial highlight -->
    <ellipse cx="512" cy="380" rx="500" ry="400" fill="rgba(40,60,100,0.3)"/>

    <!-- Inner border ring -->
    <path d="M512 16C232.3 16 124.2 16 71.1 71.1S16 232.3 16 512s0 383.8 55.1 440.9S232.3 1008 512 1008s383.8 0 440.9-55.1S1008 791.7 1008 512s0-383.8-55.1-440.9S791.7 16 512 16z"
          fill="none" stroke="url(#borderGrad)" stroke-width="2"/>
  </g>

  <!-- Face group with 3D shadow -->
  <g clip-path="url(#squircle)" filter="url(#shadow3d)">
    <!-- Left eyebrow -->
    <path d="M310 340 Q365 295 420 340" fill="none" stroke="url(#browGrad)" stroke-width="18" stroke-linecap="round"/>

    <!-- Right eyebrow -->
    <path d="M600 340 Q655 295 710 340" fill="none" stroke="url(#browGrad)" stroke-width="18" stroke-linecap="round"/>
  </g>

  <g clip-path="url(#squircle)">
    <!-- Left eye -->
    <g filter="url(#eyeGlow)">
      <rect x="310" y="390" width="120" height="100" rx="8" fill="url(#eyeGrad)"/>
      <!-- Scanlines on eye -->
      <rect x="310" y="390" width="120" height="100" rx="8" fill="url(#scanlines)"/>
      <!-- Left pupil -->
      <rect x="352" y="415" width="38" height="50" rx="4" fill="url(#pupilGrad)"/>
      <!-- Eye highlight -->
      <rect x="310" y="390" width="120" height="30" rx="8" fill="rgba(255,255,255,0.15)"/>
    </g>

    <!-- Right eye -->
    <g filter="url(#eyeGlow)">
      <rect x="590" y="390" width="120" height="100" rx="8" fill="url(#eyeGrad)"/>
      <!-- Scanlines on eye -->
      <rect x="590" y="390" width="120" height="100" rx="8" fill="url(#scanlines)"/>
      <!-- Right pupil -->
      <rect x="632" y="415" width="38" height="50" rx="4" fill="url(#pupilGrad)"/>
      <!-- Eye highlight -->
      <rect x="590" y="390" width="120" height="30" rx="8" fill="rgba(255,255,255,0.15)"/>
    </g>

    <!-- Nose (L-shape) -->
    <g>
      <path d="M510 510 L510 580 L555 580" fill="none" stroke="url(#noseGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Mouth (smile curve) -->
    <path d="M390 660 Q510 720 630 660" fill="none" stroke="url(#mouthGrad)" stroke-width="14" stroke-linecap="round"/>

    <!-- Subtle reflection overlay (top half) -->
    <path d="M512 0C224.3 0 112.2 0 56.1 56.1S0 224.3 0 512H1024C1024 224.3 1024 112.2 967.9 56.1S799.7 0 512 0z"
          fill="rgba(255,255,255,0.03)"/>
  </g>
</svg>
